name: CI

on:
  push:
    branches:
      - master
    tags:
      - "release-*.*.*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            pre-commit: false
          - python-version: "3.10"
            pre-commit: false
          - python-version: "3.11"
            pre-commit: false
          - python-version: "3.12"
            pre-commit: false
          - python-version: "3.13"
            pre-commit: true
          - python-version: "3.14"
            pre-commit: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: |
          pip install coverage coveralls
          if [ "${{ matrix.pre-commit }}" = "true" ]; then
            pip install pre-commit
          fi
          pip install "mypy>=0.782"
          pip install -e .

      - name: Run pre-commit
        if: matrix.pre-commit
        run: pre-commit run --all-files

      - name: Run mypy
        run: mypy --python-version ${{ matrix.python-version }} pysyncthru

      - name: Run tests with coverage
        run: coverage run --source=pysyncthru setup.py test

      - name: Coverage report
        if: matrix.python-version == '3.13'
        run: coverage report

      - name: Submit to Coveralls
        if: matrix.python-version == '3.13' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: coveralls --service=github

  publish-pypi:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git user
        run: git config user.name "nielstron"

      - name: Compute tag
        id: tag
        run: |
          VERSION=$(grep 'version=' setup.py | cut -d '"' -f 2)
          echo "tag=release-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.tag }}" || echo "Tag already exists"
          git push origin "${{ steps.tag.outputs.tag }}" || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
